{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
    <meta charset="UTF-8">
    <title>AI Hoax Knowledge Assistant - Chatbot</title>

    <link rel="stylesheet" href="{% static 'css/style.css' %}" />

</head>

<body>
    <div class="chat-container">
        <header class="chat-header">
            <div class="header-title">
                <h2>Cek Fakta AI</h2>
                <span>Online</span>
            </div>
            <button class="theme-toggle" id="themeToggle" title="Toggle Dark Mode">🌙</button>
            <script src="{% static 'js/script.js' %}"></script>
        </header>

        <div class="chat-body" id="chatBody">
            <div class="message bot">
                Halo! Saya asisten Cek Fakta. Silakan masukkan klaim berita yang ingin Anda verifikasi kebenarannya.
            </div>
            <div class="typing-indicator" id="typingIndicator">
                <span></span><span></span><span></span>
            </div>
        </div>
        <form method="POST" action="/"></form>
        {% csrf_token %}
        <footer class="chat-footer">
            {{ form.question }}
            <button class="send-btn" id="sendBtn" type="submit">
                <svg viewBox="0 0 24 24">
                    <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path>
                </svg>
            </button>
        </footer>
        </form>
    </div>

    <script>
        // --- DOM Elements ---
        const chatBody = document.getElementById('chatBody');
        const chatInput = document.getElementById('chatInput');
        const sendBtn = document.getElementById('sendBtn');

        const typingIndicator = document.getElementById('typingIndicator');
        let isTyping = false;


        // --- Chat Behavior ---
        function addMessage(text, sender) {
            const msgDiv = document.createElement('div');
            msgDiv.classList.add('message', sender);
            msgDiv.innerHTML = text; // Menggunakan innerHTML agar tag <br> dan <b> berfungsi

            // Masukkan pesan sebelum typing indicator agar typing indicator selalu di bawah
            chatBody.insertBefore(msgDiv, typingIndicator);
            scrollToBottom();
        }

        // function showTyping() {
        //     typingIndicator.style.display = 'block';
        //     scrollToBottom();
        // }
        function showTyping() {
            isTyping = true;
            typingIndicator.style.display = 'block';
            sendBtn.disabled = true;
            chatInput.disabled = true;
            scrollToBottom();
        }

        // function hideTyping() {
        //     typingIndicator.style.display = 'none';
        // }
        function hideTyping() {
            isTyping = false;
            typingIndicator.style.display = 'none';
            sendBtn.disabled = false;
            chatInput.disabled = false;
            chatInput.focus();
        }

        function scrollToBottom() {
            chatBody.scrollTop = chatBody.scrollHeight;
        }

        async function handleSend(e) {
            if (e) e.preventDefault();
            if (isTyping) return;

            const userText = chatInput.value.trim();
            if (!userText) return;

            addMessage(userText, 'user');
            chatInput.value = '';

            showTyping();
            sendBtn.disabled = true;
            try {
                const csrfToken =
                    document.querySelector('[name=csrfmiddlewaretoken]').value;
                const formData = new FormData();
                formData.append('question', userText);
                const response = await fetch('', {
                    method: 'POST',
                    headers: {
                        'X-CSRFToken': csrfToken
                    },
                    body: formData
                });

                const data = await response.json();
                hideTyping();
                if (data.success) {
                    addMessage(data.answer, 'bot');
                } else {
                    addMessage(
                        'Terjadi kesalahan: ' + data.error,
                        'bot'
                    );
                }

            } catch (err) {
                hideTyping();
                addMessage(
                    'Gagal menghubungi server.',
                    'bot'
                );

                console.error(err);
            } finally {
                sendBtn.disabled = false;
            }
        }

        // --- Event Listeners ---
        sendBtn.addEventListener('click', handleSend);

        chatInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !isTyping) {
                handleSend(e);
            }
        });
    </script>
</body>

</html>
